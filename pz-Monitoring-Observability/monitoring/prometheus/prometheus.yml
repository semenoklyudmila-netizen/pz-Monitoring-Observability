global:
  scrape_interval: 15s
rule_files:
/etc/prometheus/alert.rules.yml
scrape_configs:
job_name: 'webapi'
static_configs:
targets: ['webapi:3001']
job_name: 'cadvisor'
static_configs:
targets: ['cadvisor:8080'] EOF
cat > monitoring/prometheus/alert.rules.yml <<'EOF'
groups:
name: service.rules rules:
alert: WebAPIDown expr: absent(up{job="webapi"} == 1) or up{job="webapi"} == 0 for: 30s labels: severity: critical annotations: summary: "WebAPI is down" description: "The WebAPI job is not up."
