cat > README.md <<'EOF'
un:
docker compose up -d
Services:
web: http://localhost:3000
webapi: http://localhost:3001
prometheus: http://localhost:9090
grafana: http://localhost:3002
mqtt broker: localhost:1883
alert manager: http://localhost:9093
Test:
